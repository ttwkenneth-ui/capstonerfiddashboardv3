<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inspection Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 12px; }
    .card { border:1px solid #ddd; border-radius:10px; padding:12px; min-width:240px; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #eee; padding:8px; text-align:left; }
    th { background:#fafafa; position: sticky; top:0; }
    .muted { color:#666; font-size: 12px; }
    input { padding:8px; width: 320px; }
    .big { font-size: 18px; font-weight: bold; }
    .section { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Inspection Dashboard</h2>

  <div class="row">
    <div class="card">
      <div><b>Status</b></div>
      <div id="status" class="muted">Loading...</div>
    </div>

    <div class="card">
      <div><b>RFID active window</b></div>
      <div class="big">1 minute per unique tag</div>
      <div class="muted">Each UID resets independently when scanned</div>
    </div>

    <div class="card">
      <div><b>Last event time</b></div>
      <div id="lastEventTime" class="muted">-</div>
    </div>
  </div>

  <div class="row">
    <input id="search" placeholder="Search name / uidKey / inspector..." />
  </div>

  <div class="section">
    <h3>Live Active Tags</h3>
    <table>
      <thead>
        <tr>
          <th>UID Key</th>
          <th>Name</th>
          <th>Window Status</th>
          <th>Last Scanned</th>
          <th>Status</th>
          <th>Inspector</th>
        </tr>
      </thead>
      <tbody id="activeTagsBody"></tbody>
    </table>
  </div>

  <div class="section">
    <h3>Live Inspection Log (new row every scan)</h3>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>UID Key</th>
          <th>Name</th>
          <th>Status</th>
          <th>Inspector</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
